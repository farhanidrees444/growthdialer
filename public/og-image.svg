<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Background gradients -->
  <defs>
    <radialGradient id="grad1" cx="30%" cy="60%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="grad2" cx="70%" cy="40%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a" />
      <stop offset="100%" style="stop-color:#15803d" />
    </linearGradient>
    <linearGradient id="bottomLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Gradient overlays -->
  <rect width="1200" height="630" fill="url(#grad1)"/>
  <rect width="1200" height="630" fill="url(#grad2)"/>
  
  <!-- Logo box -->
  <rect x="340" y="80" width="80" height="80" rx="12" fill="url(#logoGrad)" opacity="0.9"/>
  
  <!-- Lightning bolt icon (⚡) -->
  <text x="380" y="160" font-size="56" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">⚡</text>
  
  <!-- Main heading -->
  <text x="600" y="155" font-size="66" font-weight="bold" fill="white" text-anchor="middle">Growth</text>
  <text x="750" y="155" font-size="66" font-weight="bold" fill="#16a34a" text-anchor="start">Dialer</text>
  
  <!-- Tagline -->
  <text x="600" y="240" font-size="38" fill="#d1d5db" text-anchor="middle" font-weight="500">
    The Sales Platform That Never Stops Closing
  </text>
  
  <!-- Stats section -->
  <!-- Left stat: 2,400+ -->
  <text x="350" y="360" font-size="48" font-weight="bold" fill="#16a34a" text-anchor="middle">2,400+</text>
  <text x="350" y="410" font-size="22" fill="#9ca3af" text-anchor="middle">Sales Teams</text>
  
  <!-- Divider line -->
  <line x1="550" y1="320" x2="550" y2="420" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Right stat: 4.9/5 -->
  <text x="850" y="360" font-size="48" font-weight="bold" fill="#16a34a" text-anchor="middle">4.9/5</text>
  <text x="850" y="410" font-size="22" fill="#9ca3af" text-anchor="middle">Customer Rating</text>
  
  <!-- Bottom accent line -->
  <rect y="625" width="1200" height="2" fill="url(#bottomLineGrad)"/>
</svg>